
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jonas' Online-Party Einladung</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #f2fffe 0%, #d9fbf8 42%, #b9f1ec 100%);
      overflow-x: hidden;
      overflow-y: auto;
      padding: 24px;
    }

    .scene {
      position: relative;
      width: min(100%, 760px);
      min-height: min(86vh, 620px);
      display: grid;
      place-items: center;
      perspective: 1400px;
      padding: 64px 0 40px;
    }

    .hint {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.72);
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      color: #0f5f64;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 24px rgba(18, 114, 118, 0.14);
      z-index: 10;
      transition: opacity .35s ease;
      width: max-content;
      max-width: calc(100% - 20px);
      text-align: center;
    }

    .card-wrap {
      position: relative;
      width: min(88vw, 520px);
      aspect-ratio: 1.53 / 1;
      min-height: 300px;
      cursor: pointer;
      transform-style: preserve-3d;
    }

    .shadow {
      position: absolute;
      inset: auto 7% 8%;
      height: 24px;
      background: rgba(20, 103, 108, 0.18);
      border-radius: 50%;
      filter: blur(18px);
      transition: all .8s ease;
    }

    .card {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
    }

    .panel,
    .inside {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      backface-visibility: hidden;
    }

    .inside {
      background: linear-gradient(135deg, #f9ffff, #ecfffd);
      border: 1px solid rgba(44, 155, 160, 0.18);
      box-shadow: 0 18px 45px rgba(30, 118, 122, 0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow: auto;
    }

    .inside-content {
      text-align: center;
      max-width: 390px;
      width: 100%;
      color: #125f66;
      opacity: 0;
      transform: translateY(18px) scale(.98);
      transition: all .7s ease .25s;
    }

    .inside h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.05;
    }

    .inside p {
      margin: 0;
      font-size: clamp(14px, 1.6vw, 18px);
      line-height: 1.35;
    }

    .front {
      background: linear-gradient(145deg, #1fc7c9, #49d8d2 45%, #9ceee6 100%);
      color: white;
      box-shadow: 0 24px 55px rgba(18, 112, 117, 0.28);
      transform-origin: left center;
      transition: transform 1.1s cubic-bezier(.2,.8,.2,1);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,.28);
      overflow: hidden;
    }

    .front-content {
      text-align: center;
      padding: 26px;
      transform: translateZ(40px);
    }

    .front .small {
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      opacity: .95;
      margin-bottom: 12px;
    }

    .front h2 {
      margin: 0;
      font-size: clamp(34px, 6vw, 50px);
    }

    .front .tap {
      margin-top: 18px;
      font-size: 16px;
    }

    .card-wrap.open .front {
      transform: rotateY(-148deg);
    }

    .card-wrap.open .inside-content {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .confetti {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 10px;
      height: 16px;
      opacity: 0;
      border-radius: 3px;
      transform: translate(-50%, -50%);
    }

    @keyframes burst {
      0% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) translate(var(--x), var(--y));
      }
    }
  </style>
</head>
<body>
  <div class="scene" id="scene">
    <div class="hint" id="hint">Tippe auf die Karte 🎉</div>

    <div class="card-wrap" id="cardWrap">
      <div class="card">
        <div class="inside panel">
          <div class="inside-content">
            <h1>🚨 ACHTUNG 🚨</h1>
            <p>
              Ein Mensch wird 14…<br>
              und das bin ich 😎🎉<br><br>
              Deshalb: <strong>ONLINE-PARTY am Samstag!</strong><br><br>
              ⏰ 14:00<br>
              📍 Mein Zimmer + eure Zimmer + Internet 🌍💻<br><br>
              🎮 Online-Escape-Game & zocken<br><br>
              🎯 Mission: Spaß haben 😂🔥<br><br>
              🔗 Link folgt noch… 👀
            </p>
          </div>
        </div>

        <div class="front panel">
          <div class="front-content">
            <div class="small">Für Jonas' Freunde</div>
            <h2>Online Party</h2>
            <div class="tap">Zum Öffnen tippen ✨</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const card = document.getElementById('cardWrap');

    card.addEventListener('click', () => {
      card.classList.add('open');

      for (let i = 0; i < 80; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.background = '#13c8c8';
        c.style.setProperty('--x', (Math.random()*400-200)+'px');
        c.style.setProperty('--y', (Math.random()*300-150)+'px');
        c.style.animation = 'burst 2s forwards';
        document.body.appendChild(c);
        setTimeout(()=>c.remove(),2000);
      }
    });
  </script>
</body>
</html>
